# =============================================================================
# Nginx Configuration for WBHelper Marketplace Seller Optimizer
# Reverse proxy with SSL, caching, compression, and HTTP/2
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with timing info for debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # GZIP COMPRESSION
    # =============================================================================
    # Enable gzip to reduce bandwidth and improve load times
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    # Minimum response length to compress (1000 bytes)
    gzip_min_length 1000;
    gzip_types text/html text/css application/javascript application/json
               application/x-javascript text/javascript text/xml
               application/xml application/xml+rss image/svg+xml;

    # =============================================================================
    # SSL SETTINGS
    # =============================================================================
    # Modern TLS protocols only (TLSv1.2 and TLSv1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    # Modern cipher suite - let client negotiate the best one
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session cache for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # =============================================================================
    # UPSTREAM BACKEND
    # =============================================================================
    upstream wbhelper_backend {
        server wbhelper:8080;
        keepalive 32;
    }

    # =============================================================================
    # SERVER BLOCKS
    # =============================================================================

    # -----------------------------------------------------------------------------
    # HTTP Server (Port 80) - Redirect all requests to HTTPS
    # -----------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }

        # ACME challenge for Let's Encrypt (if needed in future)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # -----------------------------------------------------------------------------
    # HTTPS Server (Port 443) - Main application server with HTTP/2 and SSL
    # -----------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL Certificate paths (self-signed or Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ---------------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Client body size limit
        client_max_body_size 10M;

        # ---------------------------------------------------------------------
        # Proxy Configuration
        # ---------------------------------------------------------------------
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # --- Proxy Timeouts ---
        # Connect timeout: time to establish connection to backend
        proxy_connect_timeout 10s;
        # Send timeout: time to send request to backend
        proxy_send_timeout 60s;
        # Read timeout: time to wait for backend response
        proxy_read_timeout 60s;

        # Proxy buffering
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # ---------------------------------------------------------------------
        # API Routes - Proxy to Backend
        # ---------------------------------------------------------------------
        location /api/ {
            proxy_pass http://wbhelper_backend;
        }

        location /auth/ {
            proxy_pass http://wbhelper_backend;
        }

        location /health {
            proxy_pass http://wbhelper_backend;
            access_log off;
        }

        # ---------------------------------------------------------------------
        # Static Assets Caching (/assets/)
        # Cache forever since these have content-hashed filenames (immutable)
        # ---------------------------------------------------------------------
        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # ---------------------------------------------------------------------
        # Static HTML
        # Short cache to allow service worker updates
        # ---------------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 5m;
            add_header Cache-Control "public, max-age=300";
        }

        # ---------------------------------------------------------------------
        # Error Pages
        # ---------------------------------------------------------------------
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
