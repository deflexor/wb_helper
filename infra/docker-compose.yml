# Local stack: Postgres, Redis, Qdrant, API, AI service.
# Run from repo root: docker compose -f infra/docker-compose.yml up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wb
      POSTGRES_PASSWORD: wb
      POSTGRES_DB: wb_helper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb -d wb_helper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://wb:wb@postgres:5432/wb_helper
      JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef}
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ai-service
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-}
    depends_on:
      - qdrant

volumes:
  pgdata:
  qdrant_data:
