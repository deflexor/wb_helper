# Local stack: Postgres, Redis, Qdrant, API, AI service, and reverse proxy.
# Run from repo root: docker compose -f infra/docker-compose.yml up --build
# Optional direct host access for app services (dev-only):
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev-ports.yml up -d
x-app-restart: &app-restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *app-restart
    environment:
      POSTGRES_USER: wb
      POSTGRES_PASSWORD: wb
      POSTGRES_DB: wb_helper
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb -d wb_helper"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  redis:
    image: redis:7-alpine
    <<: *app-restart
    expose:
      - "6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  qdrant:
    image: qdrant/qdrant:v1.12.5
    <<: *app-restart
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.20"
          memory: 256M

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    <<: *app-restart
    expose:
      - "8080"
    environment:
      # Keep env minimal: only runtime secrets/endpoints needed by backend.
      DATABASE_URL: postgres://wb:wb@postgres:5432/wb_helper
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://127.0.0.1:8080/api/hello > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.25"
          memory: 768M
        reservations:
          cpus: "0.20"
          memory: 192M

  ai-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ai-service
    <<: *app-restart
    expose:
      - "8000"
    environment:
      # Keep env minimal: no frontend/public env leakage here.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')\" || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
        reservations:
          cpus: "0.20"
          memory: 192M

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    <<: *app-restart
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  nginx:
    image: nginx:1.27-alpine
    <<: *app-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  certbot:
    image: certbot/certbot:latest
    profiles: ["ops"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  pgdata:
  qdrant_data:
  certbot_www:
  certbot_certs:
